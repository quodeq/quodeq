; evaluators/java/scan_rules.ini

[cwe_798_secrets]
label=CWE-798: Hardcoded credentials or secrets
cwe=798
dimension=security
command=grep -rn -E "(apiKey|api_key|secret|password|token)\s*=\s*\"[^\"]{8,}" {src} --include="*.java"
format=file_list

[cwe_89_string_concat_sql]
label=CWE-89: SQL injection via string concatenation
cwe=89
dimension=security
command=grep -rn -E '"\s*\+\s*.*[Ss][Ee][Ll][Ee][Cc][Tt]|[Ss][Ee][Ll][Ee][Cc][Tt].*"\s*\+' {src} --include="*.java" | head -20
format=file_list

[cwe_1080_large_files]
label=CWE-1080: Source files exceeding 300 LOC
cwe=1080
dimension=maintainability
command=find {src} -name "*.java" -not -path "*/test/*" | xargs wc -l 2>/dev/null | awk '$1 > 300 && !/total/' | sort -rn | head -20
format=file_list

[cwe_396_catch_exception]
label=CWE-396: Catching overly broad Exception class
cwe=396
dimension=reliability
command=grep -rn "catch\s*(Exception\b" {src} --include="*.java" | head -20
format=file_list

[cwe_1046_string_concat_loop]
label=CWE-1046: String concatenation in loops (use StringBuilder)
cwe=1046
dimension=performance
command=grep -rn -B2 "+=" {src} --include="*.java" | grep -E "(for|while).*\{" -A2 | grep "+=" | head -20
format=file_list

[cwe_390_empty_catch]
label=CWE-390: Empty catch block
cwe=390
dimension=reliability
command=grep -rn -A1 "catch\s*(" {src} --include="*.java" | grep -B1 "^\s*}" | grep "catch" | head -20
format=file_list

[cwe_1061_raw_types]
label=CWE-1061: Use of raw generic types
cwe=1061
dimension=maintainability
command=grep -rn -E "\b(List|Map|Set|Collection)\s+\w+\s*=" {src} --include="*.java" | grep -v "<" | grep -v "test" | head -20
format=file_list
