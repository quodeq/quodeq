; evaluators/kotlin/scan_rules.ini

[cwe_798_secrets]
label=CWE-798: Hardcoded credentials or secrets
cwe=798
dimension=security
command=grep -rn -E "(apiKey|api_key|secret|password|token)\s*=\s*\"[^\"]{8,}" {src} --include="*.kt"
format=file_list

[cwe_1080_large_files]
label=CWE-1080: Source files exceeding 300 LOC
cwe=1080
dimension=maintainability
command=find {src} -name "*.kt" -not -path "*/test/*" | xargs wc -l 2>/dev/null | awk '$1 > 300 && !/total/' | sort -rn | head -20
format=file_list

[cwe_89_sql_templates]
label=CWE-89: SQL injection via string templates
cwe=89
dimension=security
command=grep -rn -E '\$\{.*\}.*[Ss][Ee][Ll][Ee][Cc][Tt]|[Ss][Ee][Ll][Ee][Cc][Tt].*\$\{' {src} --include="*.kt" | head -20
format=file_list

[cwe_755_empty_catch]
label=CWE-755: Empty catch blocks
cwe=755
dimension=reliability
command=grep -rn -A1 "catch\s*(" {src} --include="*.kt" | grep -B1 "^\s*}" | grep "catch" | head -20
format=file_list

[cwe_755_globalscope]
label=CWE-755: GlobalScope usage (unstructured concurrency)
cwe=755
dimension=reliability
command=grep -rn "GlobalScope\." {src} --include="*.kt" | head -20
format=file_list

[cwe_1088_runblocking]
label=CWE-1088: runBlocking in production code (blocks thread)
cwe=1088
dimension=performance
command=grep -rn "runBlocking" {src} --include="*.kt" | grep -v "test\|Test\|spec\|Spec" | head -20
format=file_list

[cwe_390_empty_catch_kt]
label=CWE-390: Empty catch block
cwe=390
dimension=reliability
command=grep -rn -A1 "catch\s*(" {src} --include="*.kt" | grep -B1 "^\s*}" | grep "catch" | head -20
format=file_list
