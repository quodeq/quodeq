<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="288 209 965 588"
   role="img"
   aria-labelledby="logo-title logo-desc"
   version="1.1"
   id="svg1"
   sodipodi:docname="quodeq-logo.svg"
   inkscape:version="1.4.3 (0d15f75, 2025-12-25)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">

  <title
     id="logo-title">Quodeq logo</title>
  <desc
     id="logo-desc">Stylized code chevrons around a Q with a compass needle.</desc>
  <style
     id="style1">
    :root {
      --logo-q: #d80c18;
      --logo-chevron: #14161b;
      --logo-chevron-hover: #d80c18;
      --logo-needle: #f1171e;
      --logo-needle-dark: #aa0000;
    }

    .q-fill {
      fill: var(--logo-q);
    }

    #left-chevron,
    #right-chevron {
      fill: var(--logo-chevron);
      cursor: pointer;
      transition: fill 180ms ease, filter 180ms ease;
    }

    #left-chevron:hover,
    #right-chevron:hover {
      fill: var(--logo-chevron-hover);
      filter: url(#chevron-glow);
    }

    .needle-fill {
      fill: var(--logo-needle);
    }

    .needle-dark-fill {
      fill: var(--logo-needle-dark);
    }
  </style>
  <defs
     id="defs1">
    <filter
       id="chevron-glow"
       x="-25%"
       y="-25%"
       width="150%"
       height="150%">
      <feDropShadow
         dx="0"
         dy="0"
         stdDeviation="6"
         flood-color="#d80c18"
         flood-opacity="0.28" />
    </filter>
    <mask
       id="needle-hole-mask">
      <rect
         width="1536"
         height="1024"
         fill="#fff"
         id="rect1" />
      <circle
         id="center-cutout"
         cx="768"
         cy="502"
         r="31"
         fill="#000" />
    </mask>
  </defs>
  <path
     id="left-chevron"
     d="M4542 7154 c-29 -14 -68 -45 -87 -68 -18 -22 -109 -135 -201 -251 -92 -115 -229 -286 -304 -380 -75 -93 -262 -327 -415 -520 -153 -192 -299 -375 -323 -405 -62 -77 -84 -125 -90 -195 -6 -79 17 -158 61 -210 18 -22 161 -202 317 -400 156 -198 324 -412 374 -475 131 -165 195 -245 336 -424 237 -301 295 -370 338 -401 l44 -30 255 -3 c288 -3 303 0 303 61 0 32 -21 62 -405 557 -49 63 -159 205 -245 316 -164 213 -528 680 -620 796 -83 106 -100 137 -99 188 0 58 13 86 76 162 28 35 181 225 340 423 158 199 440 550 626 781 247 310 337 428 337 447 0 53 -19 57 -305 57 l-261 0 -52 -26z"
