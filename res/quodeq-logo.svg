     transform="translate(0 1024) scale(0.1 -0.1)"
     fill-rule="evenodd" />
  <g
     id="needle"
     mask="url(#needle-hole-mask)">
    <path
       id="needle-light"
       class="needle-fill"
       d="M 640.21436,652.66711 721.35247,466.18696 899.84338,349.64453 c -87.009,100.60868 -173.29796,201.83295 -259.62902,303.02258 z"/>
    <path
       id="needle-dark"
       class="needle-dark-fill"
       d="M 640.21436,652.66711 810.38705,542.33876 899.84338,349.64453 c -87.009,100.60868 -173.29796,201.83295 -259.62902,303.02258 z"/>
  </g>
</svg>
