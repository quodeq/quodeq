; evaluators/bash/scan_rules.ini

[cwe_78_unquoted_vars]
label=CWE-78: Unquoted variable expansion (command injection risk)
cwe=78
dimension=security
command=grep -rn -E '\$[A-Za-z_]+[^"'\''{}]' {src} --include="*.sh" | grep -v '#' | head -20
format=file_list

[cwe_798_secrets]
label=CWE-798: Hardcoded credentials or secrets
cwe=798
dimension=security
command=grep -rn -E "(API_KEY|SECRET|PASSWORD|TOKEN)=['\"][^'\"]{8,}" {src} --include="*.sh" | head -20
format=file_list

[cwe_1080_long_scripts]
label=CWE-1080: Shell scripts exceeding 200 LOC
cwe=1080
dimension=maintainability
command=find {src} -name "*.sh" | xargs wc -l 2>/dev/null | awk '$1 > 200 && !/total/' | sort -rn | head -20
format=file_list

[cwe_252_unchecked_return]
label=CWE-252: Commands without error checking
cwe=252
dimension=reliability
command=grep -rn -E "^[a-z].*[^&|]$" {src} --include="*.sh" | grep -v "echo\|printf\|#\|then\|else\|fi\|done\|esac" | grep -v "set -e" | head -20
format=file_list

[cwe_1084_useless_cat]
label=CWE-1084: Useless cat (pipe directly instead)
cwe=1084
dimension=performance
command=grep -rn -E "cat\s+\S+\s*\|" {src} --include="*.sh" | head -20
format=file_list

[cwe_459_missing_trap]
label=CWE-459: Scripts using mktemp without trap cleanup
cwe=459
dimension=reliability
command=grep -rl "mktemp" {src} --include="*.sh" | xargs grep -L "trap" 2>/dev/null | head -20
format=file_list

[cwe_78_unquoted_vars_strict]
label=CWE-78: Unquoted variables in command arguments
cwe=78
dimension=security
command=grep -rn -E '(rm|mv|cp|mkdir|chmod)\s+[^"]*\$[A-Za-z_]' {src} --include="*.sh" | grep -v '"' | head -20
format=file_list
