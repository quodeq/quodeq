# disciplines.conf
# Defines supported disciplines and their auto-detection rules.
#
# Each [section] is one discipline. Detection fields are evaluated in order
# until a match is found. Lower detect_priority values are checked first.
#
# Detection field reference:
#   detect_file          file that must exist
#   detect_contains      substring that must appear inside detect_file
#   detect_glob          glob pattern matched against any file in the repo
#   detect_dir           directory that must exist
#   detect_file_alt      alternate file (tried when detect_file is absent)
#   detect_contains_alt  substring to match inside detect_file_alt
#   detect_file_alt2     second alternate file
#   detect_contains_alt2 substring to match inside detect_file_alt2
#   detect_requires_file additional file required (supports **/glob)
#   detect_priority      tie-breaking order, lower wins (range 1–99)
#   detect_excludes      skip this discipline when named discipline already matched
#   detect_fallback      when "true", only activate if nothing else matched

[backend_springboot_java]
language=java
category=backend
detect_file=pom.xml
detect_contains=spring-boot
detect_file_alt=build.gradle
detect_contains_alt=org.springframework.boot
detect_priority=5
detect_excludes=backend_springboot_kotlin
suggested_topics=SOLID Principles,Spring Boot Best Practices,Java Code Standards,API Design Standards

[backend_springboot_kotlin]
language=kotlin
category=backend
detect_file=pom.xml
detect_contains=spring-boot
detect_file_alt=build.gradle
detect_contains_alt=org.springframework.boot
detect_requires_file=src/**/*.kt
detect_priority=4
suggested_topics=SOLID Principles,Spring Boot Best Practices,Kotlin Code Standards,API Design Standards

[backend_typescript_lambdas]
language=typescript
category=backend
detect_file=serverless.yml
detect_file_alt=serverless.yaml
detect_file_alt2=template.yaml
detect_contains_alt2=AWS::Serverless
detect_priority=7
suggested_topics=SOLID Principles,AWS Lambda Best Practices,TypeScript Standards

[frontend_nextjs]
language=typescript
category=frontend
detect_glob=next.config.*
detect_priority=3
suggested_topics=React Best Practices,Frontend Architecture,TypeScript Standards,Next.js App Router,Next.js Performance,Server Components

[frontend_react]
language=typescript
category=frontend
detect_file=package.json
detect_contains="react"
detect_priority=6
detect_excludes=frontend_nextjs
suggested_topics=React Best Practices,Frontend Architecture,TypeScript Standards

[infrastructure]
language=typescript
category=infra
detect_dir=terraform
detect_file_alt=cdk.json
detect_file_alt2=Dockerfile
detect_priority=8
detect_fallback=true
suggested_topics=Docker Standards,AWS CDK Standards

[mobile_android]
language=kotlin
category=mobile
detect_file=build.gradle
detect_contains=com.android
detect_priority=2
suggested_topics=Kotlin Code Standards,Clean Architecture,SOLID Principles,DDD Principles,Android Engineering Standards,Modern Android Development Standards

[mobile_ios]
language=swift
category=mobile
detect_glob=*.xcodeproj
detect_file_alt=Package.swift
detect_file_alt2=Podfile
detect_priority=1
suggested_topics=Swift Code Standards,Clean Architecture,SOLID Principles,DDD Principles

[cli_bash]
language=bash
category=tooling
detect_dir=lib
detect_requires_file=lib/*.sh
detect_file_alt=evaluate.sh
detect_file_alt2=main.sh
detect_priority=8
suggested_topics=Shell Scripting Best Practices,Bash Error Handling,POSIX Compatibility,CLI Design Patterns,Shell Testing Practices

[nodejs]
language=typescript
category=backend
detect_file=package.json
detect_priority=9
detect_fallback=true
suggested_topics=Node.js Best Practices,SOLID Principles,Error Handling Patterns,Security Practices,API Design Standards,TypeScript Standards

[python_fullstack]
language=python
category=backend
detect_file=pyproject.toml
detect_file_alt=setup.py
detect_dir=src
detect_requires_file=src/**/*.py
detect_priority=6
suggested_topics=Python Code Standards,Python Architecture,Python Testing,LLM Pipeline Patterns
