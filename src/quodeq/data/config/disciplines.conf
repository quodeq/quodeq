# --- Python frameworks ---
#
# detect_excludes is "skip ME if any of these already matched." Iteration is in
# priority order (low→high), so a more-specific rule must list less-specific
# rules with HIGHER priority numbers in its excludes (no-op otherwise — the
# generic rule has not run yet). The generic catch-all (python_fullstack) lists
# the framework rules in its excludes; same for go_backend and rust_backend.

[python_django]
language=python
category=backend
detect_file=manage.py
detect_file_alt=requirements.txt
detect_contains_alt=django
detect_file_alt2=pyproject.toml
detect_contains_alt2=django
detect_priority=4
suggested_topics=Django Best Practices,Django REST Framework,Python Code Standards,ORM Patterns,Web Security

[python_flask]
language=python
category=backend
detect_file=requirements.txt
detect_contains=flask
detect_file_alt=pyproject.toml
