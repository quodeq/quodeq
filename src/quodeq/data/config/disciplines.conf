detect_contains=fastapi
detect_file_alt=pyproject.toml
detect_contains_alt=fastapi
detect_priority=4
detect_excludes=python_django
suggested_topics=FastAPI Best Practices,Python Async Patterns,Pydantic Validation,API Design,Python Code Standards

# --- Python data / ML / notebooks ---
#
# These rules sit between the web frameworks (priority 4-5) and python_fullstack
# (priority 6). A pyproject that declares both Flask and torch will classify as
# Flask (lower priority value wins downstream), which is intentional — the
# serving framework is usually the more actionable rulebook. python_jupyter is a
# fallback that fires only when no other Python rule matched.

[python_ml_pytorch]
language=python
category=data
detect_file=requirements.txt
detect_contains=torch
detect_file_alt=pyproject.toml
detect_contains_alt=torch
detect_priority=5
detect_excludes=python_django,python_flask,python_fastapi
suggested_topics=PyTorch Best Practices,Training Loop Patterns,Reproducibility,Experiment Tracking,Python Code Standards

