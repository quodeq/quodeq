name: Enforce main source branch

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  check-source:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR source is develop or release
        run: |
          SOURCE="${{ github.head_ref }}"
          if [ "$SOURCE" = "develop" ] || [[ "$SOURCE" == release/* ]]; then
            echo "Source branch '$SOURCE' is allowed. OK."
          else
            echo "::error::PRs to main must come from develop or a release/* branch."
            exit 1
          fi
