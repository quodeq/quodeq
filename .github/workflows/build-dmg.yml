name: Build Desktop Apps

on:
  release:
    types: [published]

jobs:
  build-menubar-dmg:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: bash packaging/macos/build-dmg.sh

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          DMG="dist/QuodeqBar-${VERSION}-macOS.dmg"
          if [ -f "$DMG" ]; then
            gh release upload "${{ github.event.release.tag_name }}" "$DMG" --clobber
          else
            echo "DMG not found at $DMG"
            exit 1
          fi

  build-dashboard-dmg:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: bash packaging/macos/build-dashboard-dmg.sh

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          DMG="dist/Quodeq-${VERSION}-macOS.dmg"
          if [ -f "$DMG" ]; then
            gh release upload "${{ github.event.release.tag_name }}" "$DMG" --clobber
          else
            echo "DMG not found at $DMG"
            exit 1
          fi

  build-windows-exe:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build exe
        shell: pwsh
        run: .\packaging\windows\build-exe.ps1

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          ZIP="dist/Quodeq-${VERSION}-Windows.zip"
          if [ -f "$ZIP" ]; then
            gh release upload "${{ github.event.release.tag_name }}" "$ZIP" --clobber
          else
            echo "Zip not found at $ZIP"
            exit 1
          fi
