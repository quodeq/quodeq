version: 2
# Cooldown defers PRs until a release has settled, defending against
# compromised versions that get yanked within hours of publication.
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file#cooldown
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2

  - package-ecosystem: "npm"
    # package.json lives under src/quodeq/ui, not the repo root. Use the
    # `directories` (list) form: an earlier `directory:` value change (2026-05-25)
    # did not dislodge Dependabot's stale root-scoped npm version-update job,
    # which keeps failing weekly with "/package.json not found". Changing the
    # config shape forces Dependabot to re-register the ecosystem at the new path.
    directories:
      - "/src/quodeq/ui"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2
    # react-dom's peer dependency pins an exactly-matching react version
    # (react-dom@19.2.7 needs react@^19.2.7). Bumping one without the other in
    # separate PRs breaks `npm ci` with ERESOLVE (happened in #596/#599). Group
    # the react packages so they are always bumped together in a single PR.
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@testing-library/react"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    open-pull-requests-limit: 5
    cooldown:
      # github-actions does not version with semver, so Dependabot rejects the
      # semver-*-days keys for this ecosystem. Only default-days is supported.
      default-days: 3
