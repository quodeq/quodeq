name: Bug Report
description: Report something that is not working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `quodeq evaluate /path/to/project`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Quodeq version
      description: Output of `quodeq --version`
      placeholder: "1.0.3"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.4 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.4"
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: AI provider
      description: Which provider were you using?
      placeholder: "Ollama / Claude Code / Codex CLI / Gemini CLI"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages or logs here.
      render: shell
    validations:
      required: false
