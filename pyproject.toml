[project]
name = "quodeq"
version = "0.1.0"
description = "Source code quality evaluation platform powered by AI"
readme = "README.md"
authors = [
    { name = "Victor Purcallas Marchesi", email = "vpurcallas@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "jsonschema",
    "flask>=3.0.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]

[project.scripts]
quodeq = "quodeq:main"

[build-system]
requires = ["uv_build>=0.10.6,<0.11.0"]
build-backend = "uv_build"
